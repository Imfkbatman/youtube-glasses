<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>YouTube Glass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section id="home" class="screen active">
      <h1>YouTube Glass</h1>
      <p class="hint">Вставь ID или ссылку YouTube и нажми Play</p>

      <input id="videoInput" class="focusable" placeholder="YouTube link / video ID" autocomplete="off" />
      <button id="playBtn" class="focusable">▶ Play</button>

      <div class="quick">
        <button class="focusable preset" data-id="dQw4w9WgXcQ">Test video</button>
        <button id="openMobile" class="focusable">Open m.youtube</button>
      </div>

      <p class="small">Навигация: стрелки / D‑Pad / Neural Band. Enter — выбрать. Backspace/Esc — назад.</p>
    </section>

    <section id="player" class="screen">
      <iframe id="ytFrame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      <button id="backBtn" class="focusable overlay">← Back</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
